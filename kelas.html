<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Kelas — Arsip Siswa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="mobile-header-bar">
                <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
                <h2 style="font-size:1.1rem; margin:0;">Kelola Kelas</h2>
                <div style="width:24px;"></div>
            </div>
            <div class="page-header">
                <h1>🏫 Kelola Kelas</h1>
                <button class="btn btn-primary" onclick="openAddKelas()">+ Tambah Kelas</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('daftar',this)">Daftar Kelas</button>
                <button class="tab-btn" onclick="switchTab('pindah',this)">Pindah Siswa</button>
                <button class="tab-btn" onclick="switchTab('kenaikan',this)">Kenaikan Kelas</button>
            </div>

            <!-- Tab 1: Daftar Kelas -->
            <div class="tab-content active" id="tab-daftar">
                <div class="kelas-grid" id="kelasGrid"><div class="loading"><div class="spinner"></div></div></div>
            </div>

            <!-- Tab 2: Pindah Siswa -->
            <div class="tab-content" id="tab-pindah">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                    <div class="form-group"><label>Kelas Asal</label><select id="kelasAsal" class="form-select" onchange="loadTransferSiswa()"><option value="">Pilih Kelas</option></select></div>
                    <div class="form-group"><label>Kelas Tujuan</label><select id="kelasTujuan" class="form-select"><option value="">Pilih Kelas</option></select></div>
                </div>
                <div class="transfer-panel">
                    <div class="transfer-list">
                        <div class="transfer-list-header">Siswa di Kelas Asal</div>
                        <div id="transferList"><div class="empty-state" style="padding:2rem;"><p>Pilih kelas asal</p></div></div>
                    </div>
                    <div class="transfer-actions">
                        <button class="btn btn-primary btn-sm" onclick="transferSelected()">Pindahkan →</button>
                    </div>
                    <div class="transfer-list">
                        <div class="transfer-list-header">Siswa di Kelas Tujuan</div>
                        <div id="targetList"><div class="empty-state" style="padding:2rem;"><p>Pilih kelas tujuan</p></div></div>
                    </div>
                </div>
            </div>

            <!-- Tab 3: Kenaikan Kelas -->
            <div class="tab-content" id="tab-kenaikan">
                <div class="card">
                    <h3 style="margin-bottom:1rem;">⬆ Proses Kenaikan Kelas</h3>
                    <p style="color:var(--text-secondary);margin-bottom:1.5rem;">Proses ini akan menaikkan semua siswa ke tingkat berikutnya dan mengacak pembagian kelas. Siswa tingkat tertinggi akan ditandai lulus.</p>
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
                        <div class="form-group"><label>Tahun Ajaran Baru *</label><input type="text" id="tahunAjaranBaru" class="form-input" placeholder="2026/2027"></div>
                        <div class="form-group"><label>Tingkat Terendah</label><input type="number" id="tingkatMin" class="form-input" value="7" min="1" max="12"></div>
                        <div class="form-group"><label>Tingkat Tertinggi</label><input type="number" id="tingkatMax" class="form-input" value="9" min="1" max="12"></div>
                    </div>
                    <div class="form-group"><label>Jumlah Kelas per Tingkat</label><input type="number" id="jumlahKelasPerTingkat" class="form-input" value="4" min="1" max="20" style="max-width:200px;"></div>
                    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
                        <button class="btn btn-primary" onclick="previewKenaikan()">🔍 Preview Hasil</button>
                    </div>
                    <div id="previewKenaikan" style="margin-top:1.5rem;display:none;"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Tambah/Edit Kelas -->
    <div class="modal-overlay" id="modalKelas">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header"><h3 id="kelasModalTitle">Tambah Kelas</h3><button class="modal-close" onclick="Modal.close('modalKelas')">&times;</button></div>
            <div class="modal-body">
                <form id="formKelas" onsubmit="saveKelas(event)">
                    <input type="hidden" id="kelasId">
                    <div class="form-group"><label>Nama Kelas *</label><input type="text" id="kNama" class="form-input" placeholder="contoh: 7A" required></div>
                    <div class="form-group"><label>Tingkat *</label><input type="number" id="kTingkat" class="form-input" min="1" max="12" required></div>
                    <div class="form-group"><label>Tahun Ajaran *</label><input type="text" id="kTahun" class="form-input" placeholder="2025/2026" required></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Modal.close('modalKelas')">Batal</button>
                <button class="btn btn-primary" onclick="document.getElementById('formKelas').requestSubmit()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Detail Kelas -->
    <div class="modal-overlay" id="modalDetailKelas">
        <div class="modal modal-lg">
            <div class="modal-header"><h3 id="detailKelasTitle">Kelas</h3><button class="modal-close" onclick="Modal.close('modalDetailKelas')">&times;</button></div>
            <div class="modal-body" id="detailKelasBody"><div class="loading"><div class="spinner"></div></div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/kelas.js"></script>
</body>
</html>
