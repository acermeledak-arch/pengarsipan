<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistem Pengarsipan Siswa - Login">
    <title>Login — Arsip Siswa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="logo">
                <span class="logo-icon">🎓</span>
                <h1>Arsip Siswa</h1>
                <p>Sistem Pengarsipan Dokumen Siswa</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Masukkan password" required>
                </div>
                <div id="loginError" style="color:var(--danger);font-size:0.8rem;margin-bottom:1rem;display:none;"></div>
                <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg">
                    <span id="loginText">Masuk</span>
                    <span id="loginSpinner" class="spinner" style="display:none;width:18px;height:18px;border-width:2px;"></span>
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Auto redirect if already logged in
        (async () => {
            const session = await Auth.getSession();
            if (session) window.location.href = 'dashboard.html';
        })();

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            const text = document.getElementById('loginText');
            const spin = document.getElementById('loginSpinner');

            btn.disabled = true; text.textContent = 'Memproses...'; spin.style.display = 'inline-block';
            errEl.style.display = 'none';

            try {
                await Auth.login(
                    document.getElementById('username').value,
                    document.getElementById('password').value
                );
                window.location.href = 'dashboard.html';
            } catch (err) {
                errEl.textContent = 'Email atau password salah.';
                errEl.style.display = 'block';
                btn.disabled = false; text.textContent = 'Masuk'; spin.style.display = 'none';
            }
        }
    </script>
</body>
</html>
