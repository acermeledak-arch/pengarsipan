<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola User — Arsip Siswa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="mobile-header-bar">
                <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
                <h2 style="font-size:1.1rem; margin:0;">Manajemen User</h2>
                <div style="width:24px;"></div>
            </div>
            <div class="page-header">
                <h1>👥 Kelola User</h1>
                <button class="btn btn-primary" onclick="openAddUser()">+ Tambah User</button>
            </div>
            <div class="table-container">
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>No</th><th>Nama</th><th>Username</th><th>Role</th><th>Kelas</th><th>Aksi</th></tr></thead>
                        <tbody id="usersTable"><tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalUser">
        <div class="modal">
            <div class="modal-header"><h3 id="userModalTitle">Tambah User</h3><button class="modal-close" onclick="Modal.close('modalUser')">&times;</button></div>
            <div class="modal-body">
                <form id="formUser" onsubmit="saveUser(event)">
                    <input type="hidden" id="userId">
                    <div class="form-group"><label>Nama Lengkap *</label><input type="text" id="uNama" class="form-input" required></div>
                    <div class="form-group"><label>Username *</label><input type="text" id="uUsername" class="form-input" required></div>
                    <div class="form-group" id="passwordGroup"><label>Password *</label><input type="password" id="uPassword" class="form-input" minlength="6"></div>
                    <div class="form-group">
                        <label>Role *</label>
                        <select id="uRole" class="form-select" required onchange="toggleKelasField()">
                            <option value="admin">Admin</option>
                            <option value="walas">Wali Kelas</option>
                        </select>
                    </div>
                    <div class="form-group" id="kelasGroup" style="display:none;">
                        <label>Kelas yang Diampu *</label>
                        <select id="uKelas" class="form-select"><option value="">Pilih Kelas</option></select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Modal.close('modalUser')">Batal</button>
                <button class="btn btn-primary" onclick="document.getElementById('formUser').requestSubmit()">Simpan</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
